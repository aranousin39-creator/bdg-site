<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 20px;
}

.box {
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;
}

input {
  padding: 10px;
  width: 80%;
  margin: 10px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 12px 20px;
  background: #22c55e;
  border: none;
  border-radius: 10px;
  color: white;
}
</style>

</head>
<body>

<div class="box">
<h2>Register</h2>

<p>Your Invite Code:</p>
<p id="code"></p>

<input placeholder="Enter Name"><br>
<input placeholder="Enter Password"><br>

<button>Register</button>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const code = urlParams.get('invitationCode');
document.getElementById('code').textContent = code || "No code";
</script>

</body>
</html>
